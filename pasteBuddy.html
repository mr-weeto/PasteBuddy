<html>
    <head>
        <title>PASTEBUDDY</title>
      <style>
      .buddy  {
        background-color: #3476AC; /* Green background */
        border: 1px solid #164963; /* Green border */
        color: white; /* White text */
        padding: 10px 24px; /* Some padding */
        cursor: pointer; /* Pointer/hand icon */
        width: 100%; /* Set a width if needed */
      }
      .dateBuddy  {
        background-color: #FF9001; /* orange background */
        border: 1px solid #A04916;
        color: white; /* White text */
        padding: 10px 24px; /* Some padding */
        cursor: pointer; /* Pointer/hand icon */
        width: 100%; /* Set a width if needed */
      }
      .delete{
        background-color: #3476AC; 
        border: 1px solid #164963; /* Green border */
        color: white; /* White text */
        padding: 10px 24px; /* Some padding */
        cursor: pointer; /* Pointer/hand icon */
        width: 5%; /* Set a width if needed */
      }
      .dateDelete{
        background-color: #FF9001; 
        border: 1px solid #A04916; 
        color: white; /* White text */
        padding: 10px 24px; /* Some padding */
        cursor: pointer; /* Pointer/hand icon */
        width: 5%; /* Set a width if needed */
      }
      .buddyContainer{
          display: flex;
      }

      .buddy :not(:last-child) {
        border-bottom: none; /* Prevent double borders */
      }

      /* Add a background color on hover */
      .buddy:hover {
        background-color: #27577F;
      }
      .dateBuddy:hover {
        background-color: #B76501;
      }
      .delete:hover {
        background-color: #27577F;
      }
      .new-window{

      }
      .center {
        text-align: center;
      }
      .hidden{
        visibility: hidden;
      }
    </style>
    </head>

    <body oncontextmenu="return false;" style="background-color:#F5F5F5;">
      <div class='new-window center', id='popOut'>
        <a onclick="newWindow();">
          Pop Out Window
        </a>
      </div>

      <div class="btn-group", id='btn-group'>

      </div>

      <div class="inputs center", id='inputs'>
        <label for="initials">Initials:</label>
        <input type="text" id="initials" name="initials" size="1">
      </div>


      <///////////////////HTML UP HERE///////////////////>

      <///////////////JAVASCRIPT DOWN HERE///////////////>

      <script>
        window.getCount = function(parent, getChildrensChildren){//accepts DOM object and bool, counts children(and grandchildren) of DOM object
            var relevantChildren = 0;
            var children = parent.childNodes.length;
            for(var i=0; i < children; i++){
                if(parent.childNodes[i].nodeType != 3){
                    if(getChildrensChildren)
                        relevantChildren += getCount(parent.childNodes[i],true);
                    relevantChildren++;
                }
            }
            return relevantChildren;
        }
        async function makeButton(input) {//makes a new button
          var btngrp = document.getElementById('btn-group');//get reference to button group
          var container = document.createElement('div');
          container.classList.add('buddyContainer');

          var btn = document.createElement('BUTTON');//make new button
          btn.classList.add('buddy');
          btn.classList.add('textBuddy');
          btn.id= getCount(btngrp);//set id to position of button//pull to higher scope
          setButtonData(btn, input);
          container.append(btn);

          var delBtn = document.createElement('BUTTON');//make new button
          delBtn.classList.add('delete');
          delBtn.id= getCount(btngrp);//set id to position of button
          delBtn.innerHTML = "X";
          container.append(delBtn);
 
          btngrp.append(container);//append button to end of group
        }
        async function restoreButtons() {
          var buttonData = getButtonDataFromLocalStorage();
          for (i=0;i<buttonData.length; i++){
             makeButton(buttonData[i]);           
          }
        }
        async function paste(input) {//accepts html element and sets innerHTML to clipboard contents
          const text = await navigator.clipboard.readText();
          setButtonData(input, removeDateAppend(text));
        }
        async function copy(input) {//accepts html element and copies value to clipboard
          if (input.classList.contains('dateBuddy')){
            console.log("in input class = datebuddy");
            var dateAppend = getDateAppend(); 

            var text = input.value + dateAppend;
          }
          else{
            var text = input.value;
          }

          try {
            await navigator.clipboard.writeText(text);
            console.log('Element contents copied to clipboard');
          } catch (err) {
            console.error('Failed to copy: ', err);
          }
        }
        function deleteButton(input){
          console.log("input: "+input);
          var id = input.firstChild.id;
          deleteButtonDataInLocalStorageById(id);
          deleteDateMapById(id);
          input.remove();
          updateButtons();
        }
        async function newWindow(){//reopen page in a popup to allow full resizing
          //first clear current page
          setTimeout(window.close, 10);
          var divs = document.getElementsByTagName('div');
          for (var i = 0, l = divs.length; i < l; i++) {
              if (divs[i].getAttribute('class') == 'btn-group')
                  if (divs[i].style.display == 'none') divs[i].style.display = '';
                  else divs[i].style.display = 'none';
          }
          var params = [
              'height='+screen.height,
              'width='+420,
              'fullscreen=yes' // only works in IE, but here for completeness
          ].join(',');
               // and any other options from
               // https://developer.mozilla.org/en/DOM/window.open
               //window.open(document.URL, '_blank', 'location=yes,height=,width=420,scrollbars=yes,status=yes');
          //

          var popup = window.open(document.URL, '_blank', params, 'location=no,scrollbars=no,status=no');
          popup.moveTo(0,0);

          setTimeout(window.close, 10);
        }

        async function updateButtons(){
          var buddyVar = document.getElementsByClassName('buddy');
          var dateMap = getDateMap();
          var buttonData = getButtonDataFromLocalStorage();
          for (i=0; i<buddyVar.length; i++){
              buddyVar.item(i).id = i;
              buddyVar.item(i).nextSibling.id = i;
              setButtonData(buddyVar.item(i), buttonData[i]);
              console.log("datemap is "+dateMap[i]+" in update buttons");
              if (dateMap[i]){//set class list based on dateMap
                buddyVar.item(i).classList.add("dateBuddy");
                buddyVar.item(i).classList.remove("textBuddy");
                buddyVar.item(i).nextSibling.classList.add("dateDelete");
                buddyVar.item(i).nextSibling.classList.remove("delete");
              }else{
                buddyVar.item(i).classList.remove("dateBuddy");
                buddyVar.item(i).classList.add("textBuddy");
                buddyVar.item(i).nextSibling.classList.remove("dateDelete");
                buddyVar.item(i).nextSibling.classList.add("delete");
              }
          }
        }
        function getDateAppend(){
          var d = new Date(Date.now()).toLocaleString().split(',')[0];
          var initial = document.getElementById('initials').value.substring(0,2);
          var dateAppend = (' -'+initial+ ' ' + d);
          return dateAppend;
        }
        async function setButtonData(button, data) {//takes reference to button, sets button value, innerHTML, and localstorage data
          var shownCharacters = (window.innerWidth / 20); //sizes shown text by window size
          if (getDateMapById(button.id)){
            console.log("in setButtonData, is datebuddy");
            var dateAppend = getDateAppend();
            if (data.length > ((shownCharacters-6) * 2 + 11) ){//text compression
              button.innerHTML = data.substr(1,(shownCharacters-6)) + "..." + data.substr((data.length - (shownCharacters-6)), data.length);
              button.innerHTML += dateAppend;
            }
            else{
              button.innerHTML = data;
              button.innerHTML += dateAppend;
            }
          }
          else{//not dateBuddy
            if (data.length > (shownCharacters * 2 + 11) ){//if text needs to be compressed
              button.innerHTML = data.substr(0,shownCharacters) + "..." + data.substr((data.length - shownCharacters), data.length);
            }
            else{
              button.innerHTML = data;
            }
          }
          button.value = data;//set value
          setButtonDataInLocalStorage(button.id, removeDateAppend(data));
        }
        function getButtonDataFromLocalStorage(){//returns stored data or a placeholder if none exist
          var buttonData = JSON.parse(localStorage.getItem('buttonData'));
          if (buttonData == null){
            buttonData = [];
            buttonData.push('Left(copy)|Right(paste)|Mid(add date)');
            localStorage.setItem("buttonData", JSON.stringify(buttonData));
            buttonData = JSON.parse(localStorage.getItem('buttonData'));
          }
          return buttonData; 
        }
        function getButtonDataFromLocalStorageById(id){//returns stored data at a given index
          var buttonData = JSON.parse(localStorage.getItem('buttonData'));
          return buttonData[id]; 
        }
        function setButtonDataInLocalStorage(index, value){
          var buttonData = getButtonDataFromLocalStorage();
          buttonData[index] = value;
          localStorage.setItem("buttonData", JSON.stringify(buttonData));
        }
        function deleteButtonDataInLocalStorageById(index){
          console.log("in deltebuttondatainlocalstorage|index: "+index);
          var buttonData = getButtonDataFromLocalStorage();
          buttonData[index] = null;
          buttonData = buttonData.filter((index) => index != null);//filters out the newly null value
          localStorage.setItem("buttonData", JSON.stringify(buttonData));
        }
        function getDateMap(){
          var dateMap = JSON.parse(localStorage.getItem('dateMap'));
          if (dateMap == null){
            var mapSize = getButtonDataFromLocalStorage().length;
            dateMap = Array(mapSize).fill(false);
            localStorage.setItem("dateMap", JSON.stringify(dateMap));
            dateMap = JSON.parse(localStorage.getItem('dateMap'));
          }
          return dateMap; 
        }
        function getDateMapById(index){
          var map = getDateMap(); 
          return map[index];
        }
        function setDateMap(index){
          var map = getDateMap(); 
          map[index] = !map[index];
          localStorage.setItem("dateMap", JSON.stringify(map)); 
        }
        function appendDateMap(){
          var map = getDateMap(); 
          map.push(false);
          localStorage.setItem("dateMap", JSON.stringify(map)); 
        }
        function deleteDateMapById(index){
          console.log("in delteDateMap|index: "+index);
          var dateMap = getDateMap(); 
          dateMap[index] = null;
          dateMap = dateMap.filter((index) => index != null);//filters out the newly null value
          localStorage.setItem("dateMap", JSON.stringify(dateMap));
        }
        function removeDateAppend(input) {
          let regex = /\s-[A-Za-z]{0,2}\s\d{1,2}\/\d{1,2}\/\d{4}$/i;
          return String(input).replace(regex, '');
        }
        /////////////function definitions up here/////////////
        
        restoreButtons();
        updateButtons();


        //this code block gets the clicked element
        document.addEventListener('click', function(e) {//left click listener
          if (e.button == 0) {
            e = e || window.event;
            var target = e.target || e.srcElement;//get clicked element as object and store
            text = target.textContent || target.innerText;
            updateButtons();
            if (target.classList.contains('buddy')){
              copy(target);
              //alert('left clicked button with "'+target.innerHTML+'" as innerHTML');
            }
          }
        }, false);
        document.addEventListener('auxclick', function(e) {//middle click listener
          if (e.button == 1) {
            e = e || window.event;
            var target = e.target || e.srcElement;//get clicked element as object and store
            text = target.textContent || target.innerText;
            if(target.classList.contains('buddy')){//toggle button class between a dated or non dated button
              setDateMap(target.id);
            }
            console.log('middle clicked button id:'+target.id+"and class: "+target.classList);
            updateButtons(target);
          }
        }, false);
        document.addEventListener('auxclick', function(e) {//right click listener
          if (e.button == 2) {
            e = e || window.event;
            var target = e.target || e.srcElement;//get clicked element as object and store
            if (target == '[object HTMLButtonElement]'){//if the element is a button do this
              if (target.classList.contains('buddy') ){
                paste(target);
                var btngrp = document.getElementById('btn-group');//get reference to button group
                console.log("target.id >= (getCount(btngrp) : "+target.id +">="+ (getCount(btngrp)-1) );
                if (target.id >= (getCount(btngrp) -1) ){//if button rightclicked is the last button
                  makeButton('Left(copy)|Right(paste)|Mid(add date)');
                }
              }
              else{
                console.log("delete button "+target.id);
                deleteButton(target.parentElement);                
              }
            }
          }
        }, false);
        //only allow letters in initials form
        const inputField = document.getElementById('initials');
        inputField.addEventListener('keypress', (e) => {
          const key = e.key;
          // Allow only letters (a-z, A-Z)
          if (!/^[A-Za-z]$/.test(key)) {
            e.preventDefault(); // Block the invalid key
          }
        });

        if (window.innerWidth < (screen.width/3) ){//on page load hide "popOut" div if window is <1/3 of the screen
          document.getElementById('popOut').style.display = 'none';
        }
      </script>
    </body>
</html>
